<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣藥品回收監測看板</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
</head>
<body class="bg-light">
    <div class="container py-4">
        <h2 class="mb-4 fw-bold text-secondary">台灣藥品回收監測看板</h2>
        
        <div class="row mb-4">
            <div class="col-md-6 offset-md-3 bg-white p-3 rounded shadow-sm">
                <canvas id="reasonChart"></canvas>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <table id="recallTable" class="table table-hover table-bordered" style="width:100%">
                    <thead class="table-light">
                        <tr>
                            <th>發文日期</th>
                            <th>分級</th>
                            <th>產品名稱</th>
                            <th>回收原因</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        // 抓取 GitHub Actions 產出的靜態 JSON
        fetch('data/data.json')
            .then(response => response.json())
            .then(data => {
                const reasonsCount = {};
                let tableHTML = "";

                // 1. 資料清洗與 HTML 組合
                data.forEach(item => {
                    // 校正鍵值：使用 item.原因、item.產品、item.日期
                    let rawReason = item.原因 || "未註明";
                    let shortReason = rawReason.substring(0, 15) + "..."; // 擷取前15字供圓餅圖標籤使用
                    reasonsCount[shortReason] = (reasonsCount[shortReason] || 0) + 1;

                    // 處理分級標籤顏色
                    let badgeClass = item.回收分級 && item.回收分級.includes("一") ? "bg-danger" : "bg-warning text-dark";

                    tableHTML += `
                        <tr>
                            <td>${item.日期 || ''}</td>
                            <td><span class="badge ${badgeClass}">${item.回收分級 || ''}</span></td>
                            <td><strong>${item.產品 || ''}</strong></td>
                            <td>${rawReason}</td>
                        </tr>
                    `;
                });

                // 2. 渲染 Chart.js 圓餅圖
                new Chart(document.getElementById('reasonChart'), {
                    type: 'doughnut', // 改為環圈圖提升視覺質感
                    data: {
                        labels: Object.keys(reasonsCount),
                        datasets: [{
                            data: Object.values(reasonsCount),
                            backgroundColor: [
                                '#4e73df', '#1cc88a', '#36b9cc', '#f6c23e', '#e74a3b', '#858796'
                            ]
                        }]
                    },
                    options: {
                        plugins: { title: { display: true, text: '回收原因分佈概況' } }
                    }
                });

                // 3. 將 HTML 注入表格並初始化 DataTables
                document.querySelector('#recallTable tbody').innerHTML = tableHTML;
                
                $('#recallTable').DataTable({
                    "order": [[ 0, "desc" ]], // 預設依據「日期」(第0欄) 降冪排序
                    "language": {
                        "url": "//cdn.datatables.net/plug-ins/1.13.6/i18n/zh-HANT.json" // 繁體中文化
                    },
                    "pageLength": 10 // 預設顯示 10 筆
                });
            })
            .catch(error => {
                console.error('資料載入失敗:', error);
                alert("資料載入失敗，請檢查 data.json 路徑或按 F12 查看主控台錯誤。");
            });
    </script>
</body>
</html>
