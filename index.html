<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣藥品回收監測看板</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">

    <style>
        :root {
            --bg: #eef1f6;
            --surface: #ffffff;
            --surface2: #f4f6fa;
            --border: #e2e6ef;
            --border-light: #edf0f7;

            --text: #1a2035;
            --text-dim: #6b7a99;
            --text-muted: #b0bcd4;

            --blue: #3b82f6;
            --blue-soft: #eff6ff;
            --blue-border: #bfdbfe;

            --red: #ef4444;
            --red-soft: #fef2f2;
            --red-border: #fecaca;

            --amber: #d97706;
            --amber-soft: #fffbeb;
            --amber-border: #fde68a;

            --green: #16a34a;
            --green-soft: #f0fdf4;
            --green-border: #bbf7d0;

            --sans: 'Noto Sans TC', sans-serif;
            --mono: 'DM Mono', monospace;
            --radius: 12px;
            --shadow: 0 1px 3px rgba(15,23,42,0.06), 0 1px 2px rgba(15,23,42,0.04);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            min-height: 100vh;
            font-size: 14px;
        }

        /* ─── Top Nav ─── */
        .top-nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
            box-shadow: var(--shadow);
        }

        .nav-inner {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 28px;
            height: 68px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .brand-icon {
            width: 36px; height: 36px;
            border-radius: 8px;
            background: var(--blue-soft);
            border: 1px solid var(--blue-border);
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
        }

        .brand-text h1 {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.01em;
            line-height: 1.2;
        }

        .brand-text p {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--text-muted);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-top: 1px;
        }

        .nav-divider {
            width: 1px; height: 28px;
            background: var(--border);
            flex-shrink: 0;
        }

        .nav-stats {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }

        .stat-pill {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid;
            cursor: default;
            transition: transform 0.15s;
        }

        .stat-pill:hover { transform: translateY(-1px); }

        .stat-pill .dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .stat-pill.red   { background: var(--red-soft);   color: var(--red);   border-color: var(--red-border); }
        .stat-pill.amber { background: var(--amber-soft);  color: var(--amber); border-color: var(--amber-border); }
        .stat-pill.green { background: var(--green-soft);  color: var(--green); border-color: var(--green-border); }

        .stat-pill.red   .dot { background: var(--red); }
        .stat-pill.amber .dot { background: var(--amber); animation: pulse 2s infinite; }
        .stat-pill.green .dot { background: var(--green); }

        @keyframes pulse {
            0%, 100% { opacity:1; transform:scale(1); }
            50%       { opacity:.5; transform:scale(.8); }
        }

        .nav-search {
            margin-left: auto;
            position: relative;
            flex-shrink: 0;
        }

        .nav-search input {
            width: 280px;
            padding: 8px 14px 8px 36px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: var(--sans);
            font-size: 13px;
            color: var(--text);
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .nav-search input::placeholder { color: var(--text-muted); }

        .nav-search input:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
            background: var(--surface);
        }

        .search-icon {
            position: absolute; left: 11px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 13px;
            pointer-events: none;
        }

        /* ─── Shell ─── */
        .shell {
            max-width: 1280px;
            margin: 0 auto;
            padding: 28px 28px 72px;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
        }

        .section-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--blue);
        }

        .section-badge {
            font-family: var(--mono);
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 100px;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text-dim);
        }

        .live-tag {
            font-family: var(--mono);
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.12em;
            padding: 5px 12px;
            border-radius: 6px;
            background: var(--blue-soft);
            color: var(--blue);
            border: 1px solid var(--blue-border);
        }

        /* ─── Main Grid ─── */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 310px;
            gap: 16px;
            align-items: start;
        }

        @media (max-width: 900px) {
            .main-grid { grid-template-columns: 1fr; }
        }

        /* ─── Card ─── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .card-header {
            padding: 13px 18px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-title {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        /* ─── DataTable Overrides ─── */
        #recallTable_wrapper {
            padding: 12px 16px 16px;
        }

        #recallTable_wrapper .dataTables_filter input,
        #recallTable_wrapper .dataTables_length select {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 7px;
            color: var(--text);
            padding: 5px 10px;
            font-family: var(--sans);
            font-size: 12.5px;
            outline: none;
        }

        #recallTable_wrapper .dataTables_filter input:focus,
        #recallTable_wrapper .dataTables_length select:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }

        #recallTable_wrapper .dataTables_filter label,
        #recallTable_wrapper .dataTables_length label,
        #recallTable_wrapper .dataTables_info {
            color: var(--text-dim);
            font-size: 12.5px;
        }

        #recallTable_wrapper .dataTables_paginate .paginate_button {
            color: var(--text-dim) !important;
            border: 1px solid var(--border) !important;
            border-radius: 6px !important;
            padding: 4px 10px !important;
            margin: 0 2px !important;
            font-size: 12.5px;
            background: var(--surface) !important;
            transition: all 0.15s;
        }

        #recallTable_wrapper .dataTables_paginate .paginate_button:hover {
            background: var(--blue-soft) !important;
            color: var(--blue) !important;
            border-color: var(--blue-border) !important;
        }

        #recallTable_wrapper .dataTables_paginate .paginate_button.current {
            background: var(--blue) !important;
            color: #fff !important;
            border-color: var(--blue) !important;
            font-weight: 600;
        }

        #recallTable {
            border-collapse: separate !important;
            border-spacing: 0 !important;
            width: 100% !important;
        }

        #recallTable thead th {
            background: var(--surface2);
            color: var(--text-dim);
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 10px 14px;
            border: none !important;
            border-bottom: 1px solid var(--border) !important;
            white-space: nowrap;
        }

        #recallTable tbody tr {
            transition: background 0.1s;
        }

        #recallTable tbody tr:hover td {
            background: var(--blue-soft) !important;
        }

        #recallTable tbody td {
            border: none !important;
            border-bottom: 1px solid var(--border-light) !important;
            padding: 12px 14px;
            font-size: 13.5px;
            color: var(--text);
            vertical-align: middle;
            background: transparent;
        }

        .date-cell {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text-dim);
            white-space: nowrap;
        }

        .product-name {
            font-weight: 600;
            color: var(--text);
        }

        .reason-text {
            font-size: 12.5px;
            color: var(--text-dim);
            line-height: 1.5;
        }

        /* ─── Badges ─── */
        .badge-grade {
            display: inline-flex;
            align-items: center;
            font-family: var(--mono);
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.05em;
            padding: 3px 9px;
            border-radius: 100px;
            white-space: nowrap;
            border: 1px solid;
        }

        .badge-danger  { background: var(--red-soft);   color: var(--red);   border-color: var(--red-border); }
        .badge-warning { background: var(--amber-soft);  color: var(--amber); border-color: var(--amber-border); }

        /* ─── Chart ─── */
        .chart-wrap {
            height: 230px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        /* ─── Legend ─── */
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 16px;
            border-bottom: 1px solid var(--border-light);
            transition: background 0.1s;
            cursor: default;
        }

        .legend-item:last-child { border-bottom: none; }
        .legend-item:hover { background: var(--surface2); }

        .legend-dot {
            flex-shrink: 0;
            width: 9px; height: 9px;
            border-radius: 50%;
        }

        .legend-label {
            flex: 1;
            font-size: 12px;
            color: var(--text-dim);
            line-height: 1.4;
        }

        .legend-count {
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 500;
            color: var(--text);
            background: var(--surface2);
            padding: 2px 8px;
            border-radius: 100px;
            border: 1px solid var(--border);
        }

        /* ─── Skeleton ─── */
        .skel {
            height: 13px;
            border-radius: 4px;
            background: linear-gradient(90deg, var(--border) 25%, var(--border-light) 50%, var(--border) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
        }

        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
/* ─── 新增：次要資訊與批號樣式 ─── */
        .meta-text {
            display: block;
            font-family: var(--mono);
            font-size: 11.5px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .batch-cell {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text);
            min-width: 160px; /* 強制保底寬度，防止被擠壓成一直線 */
            overflow-wrap: anywhere; /* 允許長字串在邊界自然換行 */
            line-height: 1.5;
        }
        
        /* ─── Scrollbar ─── */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
</head>
<body>

<!-- Top Nav -->
<nav class="top-nav">
    <div class="nav-inner">
        <div class="brand">
            <div class="brand-icon">💊</div>
            <div class="brand-text">
                <h1>西藥回收監測看板</h1>
                <p>NHI Drug Recall Monitor</p>
            </div>
        </div>

        <div class="nav-divider"></div>

        <div class="nav-stats">
            <div class="stat-pill red">
                <span class="dot"></span>
                <span id="pill-class1">—</span> 第一級
            </div>
            <div class="stat-pill amber">
                <span class="dot"></span>
                <span id="pill-class2">—</span> 第二級
            </div>
            <div class="stat-pill green">
                <span class="dot"></span>
                <span id="pill-total">—</span> 總回收
            </div>
        </div>

        <div class="nav-search">
            <span class="search-icon">🔍</span>
            <input type="text" id="globalSearch" placeholder="搜尋藥品名稱或許可證字號…">
        </div>
    </div>
</nav>

<!-- Shell -->
<div class="shell">

    <div class="section-header">
        <div class="section-title">
            <span class="section-dot"></span>
            最新回收公告
            <span class="section-badge" id="totalBadge">載入中…</span>
        </div>
        <div class="live-tag">LIVE</div>
    </div>

    <div class="main-grid">

        <!-- Table -->
          <div class="card">
            <table id="recallTable" style="width:100%">
                <thead>
                    <tr>
                        <th>發文日期</th>
                        <th>分級</th>
                        <th>產品與許可證</th>
                        <th>回收批號</th>
                        <th>回收原因</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td><div class="skel" style="width:72px"></div></td><td><div class="skel" style="width:48px"></div></td><td><div class="skel" style="width:140px"></div><div class="skel" style="width:100px; margin-top:4px; height:10px;"></div></td><td><div class="skel" style="width:80px"></div></td><td><div class="skel"></div></td></tr>
                    <tr><td><div class="skel" style="width:72px"></div></td><td><div class="skel" style="width:48px"></div></td><td><div class="skel" style="width:110px"></div><div class="skel" style="width:90px; margin-top:4px; height:10px;"></div></td><td><div class="skel" style="width:120px"></div></td><td><div class="skel"></div></td></tr>
                </tbody>
            </table>
        </div>

        <!-- Sidebar -->
        <div style="display:flex;flex-direction:column;gap:14px;">
            <div class="card">
                <div class="card-header">
                    <span class="card-title">回收原因分佈</span>
                </div>
                <div class="chart-wrap">
                    <canvas id="reasonChart"></canvas>
                </div>
            </div>

            <div class="card" id="legendPanel" style="display:none;">
                <div class="card-header">
                    <span class="card-title">主要原因</span>
                </div>
                <div id="legendBody"></div>
            </div>
        </div>

    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const PALETTE = ['#3b82f6','#f59e0b','#10b981','#ef4444','#8b5cf6','#06b6d4','#f97316','#ec4899'];

fetch('data/data.json')
    .then(r => r.json())
    .then(data => {
        let class1 = 0, class2 = 0;
        const reasonsCount = {};

        data.forEach(item => {
            const grade = item.回收分級 || '';
            if (grade.includes('一')) class1++; else class2++;
            const raw = item.原因 || '未註明';
            const key = raw.length > 20 ? raw.substring(0, 20) + '…' : raw;
            reasonsCount[key] = (reasonsCount[key] || 0) + 1;
        });

        document.getElementById('pill-total').textContent = data.length;
        document.getElementById('pill-class1').textContent = class1;
        document.getElementById('pill-class2').textContent = class2;
        document.getElementById('totalBadge').textContent = `共 ${data.length} 筆`;

let rows = '';
        data.forEach(item => {
            const grade = item.回收分級 || '';
            const isOne = grade.includes('一');
            
            // 擷取新增的 JSON 欄位
            const licenseNo = item.許可證字號 || '未註明字號';
            const holder = item.許可證持有者 || '未知藥廠';
            const batchNo = item.批號 || '未註明批號';

            rows += `<tr>
                <td class="date-cell">${item.日期 || ''}</td>
                <td><span class="badge-grade ${isOne ? 'badge-danger' : 'badge-warning'}">${grade}</span></td>
                <td>
                    <span class="product-name">${item.產品 || ''}</span>
                    <span class="meta-text">${holder} | ${licenseNo}</span>
                </td>
                <td class="batch-cell">${batchNo}</td>
                <td><span class="reason-text">${item.原因 || ''}</span></td>
            </tr>`;
        });
        document.getElementById('tableBody').innerHTML = rows;

    const dt = $('#recallTable').DataTable({
            order: [[0, 'desc']],
            pageLength: 10,
            autoWidth: false, // 1. 關閉自動寬度計算
            columnDefs: [     // 2. 明確指定各欄位寬度比例
                { width: "90px", targets: 0 },   // 第0欄: 發文日期
                { width: "60px", targets: 1 },   // 第1欄: 分級
                { width: "25%", targets: 2 },    // 第2欄: 產品與許可證
                { width: "25%", targets: 3 },    // 第3欄: 回收批號 (確保獲得1/4版面)
                { width: "35%", targets: 4 }     // 第4欄: 回收原因
            ],
            language: {
                search: '搜尋：',
                lengthMenu: '每頁 _MENU_ 筆',
                info: '第 _START_–_END_ 筆，共 _TOTAL_ 筆',
                paginate: { previous: '←', next: '→' },
                zeroRecords: '查無資料',
                infoEmpty: '共 0 筆',
                infoFiltered: '（共 _MAX_ 筆中篩選）'
            }
        });

        document.getElementById('globalSearch').addEventListener('input', function() {
            dt.search(this.value).draw();
        });

        const labels = Object.keys(reasonsCount);
        const values = Object.values(reasonsCount);

        new Chart(document.getElementById('reasonChart'), {
            type: 'doughnut',
            data: {
                labels,
                datasets: [{
                    data: values,
                    backgroundColor: PALETTE.slice(0, labels.length),
                    borderWidth: 2,
                    borderColor: '#ffffff',
                    hoverOffset: 6
                }]
            },
            options: {
                cutout: '65%',
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: '#1a2035',
                        borderColor: '#e2e6ef',
                        borderWidth: 1,
                        titleColor: '#93c5fd',
                        bodyColor: '#f4f6fa',
                        padding: 12,
                        callbacks: {
                            label: ctx => ` ${ctx.raw} 件  (${(ctx.raw/data.length*100).toFixed(1)}%)`
                        }
                    }
                }
            }
        });

        const sorted = labels.map((l,i) => ({l, v: values[i], c: PALETTE[i % PALETTE.length]}))
            .sort((a,b) => b.v - a.v).slice(0,7);

        document.getElementById('legendBody').innerHTML = sorted.map(({l,v,c}) => `
            <div class="legend-item">
                <div class="legend-dot" style="background:${c}"></div>
                <div class="legend-label">${l}</div>
                <div class="legend-count">${v}</div>
            </div>`).join('');

        document.getElementById('legendPanel').style.display = 'block';
    })
    .catch(err => {
        console.error('資料載入失敗:', err);
        document.getElementById('tableBody').innerHTML =
            `<tr><td colspan="4" style="text-align:center;padding:48px;color:var(--text-dim);font-size:13px;">
                ⚠ 資料載入失敗，請確認 data/data.json 路徑正確</td></tr>`;
    });
</script>
</body>
</html>
