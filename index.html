<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>藥品回收視覺化儀表板</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">
    <div class="container py-5">
        <h2 class="mb-4">台灣藥品回收監測看板</h2>
        <div class="row">
            <div class="col-md-6">
                <canvas id="reasonChart"></canvas>
            </div>
            </div>
    </div>

    <script>
        fetch('data/data.json')
            .then(response => response.json())
            .then(data => {
                // 1. 資料聚合邏輯 (例如統計各「回收原因」的數量)
                const reasons = {};
                data.forEach(item => {
                    // 簡化字串處理作為示範
                    let reason = item.回收原因.substring(0, 10) + "..."; 
                    reasons[reason] = (reasons[reason] || 0) + 1;
                });

                // 2. 渲染 Chart.js 圓餅圖
                new Chart(document.getElementById('reasonChart'), {
                    type: 'pie',
                    data: {
                        labels: Object.keys(reasons),
                        datasets: [{ data: Object.values(reasons) }]
                    }
                });
                
                // 3. (後續擴充) 將 data 傳入 DataTables 渲染清單
            });
    </script>
</body>
</html>
