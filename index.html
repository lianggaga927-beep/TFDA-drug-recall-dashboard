<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>西藥回收監測看板</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.dataTables.min.css">
    <style>
        :root {
            --bg:           #eef1f6;
            --surface:      #ffffff;
            --surface2:     #f4f6fa;
            --border:       #e2e6ef;
            --border-light: #edf0f7;

            --text:         #1a2035;
            --text-dim:     #6b7a99;
            --text-muted:   #b0bcd4;

            --blue:         #3b82f6;
            --blue-soft:    #eff6ff;
            --blue-border:  #bfdbfe;
            --blue-dim:     rgba(59,130,246,0.08);

            --red:          #dc2626;
            --red-soft:     #fef2f2;
            --red-border:   #fecaca;
            --red-dim:      rgba(220,38,38,0.06);

            --amber:        #d97706;
            --amber-soft:   #fffbeb;
            --amber-border: #fde68a;
            --amber-dim:    rgba(217,119,6,0.06);

            --green:        #16a34a;
            --green-soft:   #f0fdf4;
            --green-border: #bbf7d0;

            --sans: 'Noto Sans TC', sans-serif;
            --mono: 'DM Mono', monospace;
            --radius: 12px;
            --shadow-sm: 0 1px 2px rgba(15,23,42,0.05);
            --shadow: 0 1px 4px rgba(15,23,42,0.08), 0 1px 2px rgba(15,23,42,0.04);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            min-height: 100vh;
            font-size: 14px;
            -webkit-font-smoothing: antialiased;
        }

        /* ════════════════ NAV ════════════════ */
        .top-nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 200;
            box-shadow: var(--shadow-sm);
        }

        .nav-inner {
            max-width: 1320px;
            margin: 0 auto;
            padding: 0 32px;
            height: 64px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 11px;
            flex-shrink: 0;
        }

        .brand-icon {
            width: 34px; height: 34px;
            border-radius: 8px;
            background: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%);
            display: flex; align-items: center; justify-content: center;
            font-size: 15px;
            box-shadow: 0 2px 6px rgba(59,130,246,0.35);
        }

        .brand-text h1 {
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
            line-height: 1.2;
            letter-spacing: -0.01em;
        }

        .brand-text p {
            font-family: var(--mono);
            font-size: 9.5px;
            color: var(--text-muted);
            letter-spacing: 0.07em;
            text-transform: uppercase;
            margin-top: 2px;
        }

        .nav-sep { width: 1px; height: 26px; background: var(--border); flex-shrink: 0; }

        /* KPI pills */
        .nav-pills { display: flex; align-items: center; gap: 7px; }

        .kpi-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 13px;
            border-radius: 100px;
            border: 1px solid;
            font-size: 12.5px;
            font-weight: 500;
            cursor: default;
            transition: transform 0.15s, box-shadow 0.15s;
            user-select: none;
        }

        .kpi-pill:hover { transform: translateY(-1px); box-shadow: var(--shadow); }

        .kpi-pill .dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .kpi-pill.all   { background: var(--surface2);   color: var(--text-dim);  border-color: var(--border); }
        .kpi-pill.red   { background: var(--red-soft);   color: var(--red);       border-color: var(--red-border); }
        .kpi-pill.amber { background: var(--amber-soft); color: var(--amber);     border-color: var(--amber-border); }

        .kpi-pill.all   .dot { background: var(--text-muted); }
        .kpi-pill.red   .dot { background: var(--red); }
        .kpi-pill.amber .dot { background: var(--amber); animation: blink 2s infinite; }

        @keyframes blink {
            0%,100% { opacity:1; transform:scale(1); }
            50%     { opacity:.45; transform:scale(.75); }
        }

        /* Nav search */
        .nav-search { margin-left: auto; position: relative; flex-shrink: 0; }

        .nav-search input {
            width: 260px;
            padding: 7px 14px 7px 34px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: var(--sans);
            font-size: 13px;
            color: var(--text);
            outline: none;
            transition: border-color .15s, box-shadow .15s, background .15s;
        }

        .nav-search input::placeholder { color: var(--text-muted); }

        .nav-search input:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
            background: var(--surface);
        }

        .nav-search svg {
            position: absolute; left: 10px; top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: var(--text-muted);
        }

        /* ════════════════ SHELL ════════════════ */
        .shell {
            max-width: 1320px;
            margin: 0 auto;
            padding: 24px 32px 80px;
        }

        /* ════════════════ FILTER TABS ════════════════ */
        .filter-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            gap: 12px;
        }

        .filter-tabs {
            display: flex;
            align-items: center;
            gap: 4px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 4px;
            box-shadow: var(--shadow-sm);
        }

        .tab-btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 7px 16px;
            border-radius: 7px;
            font-size: 13px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            background: transparent;
            color: var(--text-dim);
            transition: background .15s, color .15s, box-shadow .15s;
            font-family: var(--sans);
            white-space: nowrap;
        }

        .tab-btn .tab-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
            transition: background .15s;
        }

        .tab-btn .tab-count {
            font-family: var(--mono);
            font-size: 10.5px;
            padding: 1px 7px;
            border-radius: 100px;
            background: var(--border-light);
            color: var(--text-dim);
            transition: background .15s, color .15s;
        }

        /* All tab */
        .tab-btn[data-grade="all"] .tab-dot { background: var(--text-muted); }
        .tab-btn[data-grade="all"].active {
            background: var(--text);
            color: #fff;
            box-shadow: 0 1px 3px rgba(15,23,42,0.18);
        }
        .tab-btn[data-grade="all"].active .tab-count { background: rgba(255,255,255,0.2); color: #fff; }
        .tab-btn[data-grade="all"].active .tab-dot   { background: #fff; }

        /* Class-1 tab */
        .tab-btn[data-grade="1"] .tab-dot { background: var(--red); }
        .tab-btn[data-grade="1"].active {
            background: var(--red-soft);
            color: var(--red);
            box-shadow: 0 1px 3px rgba(220,38,38,0.15);
        }
        .tab-btn[data-grade="1"].active .tab-count { background: rgba(220,38,38,0.12); color: var(--red); }
        .tab-btn[data-grade="1"].active .tab-dot   { background: var(--red); }

        /* Class-2 tab */
        .tab-btn[data-grade="2"] .tab-dot { background: var(--amber); }
        .tab-btn[data-grade="2"].active {
            background: var(--amber-soft);
            color: var(--amber);
            box-shadow: 0 1px 3px rgba(217,119,6,0.15);
        }
        .tab-btn[data-grade="2"].active .tab-count { background: rgba(217,119,6,0.12); color: var(--amber); }
        .tab-btn[data-grade="2"].active .tab-dot   { background: var(--amber); }

        .filter-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .result-info {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-muted);
        }

        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: var(--mono);
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.1em;
            padding: 5px 12px;
            border-radius: 6px;
            background: var(--green-soft);
            color: var(--green);
            border: 1px solid var(--green-border);
        }

        .live-badge .live-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--green);
            animation: blink 2s infinite;
        }

        /* ════════════════ TABLE CARD ════════════════ */
        .table-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        /* Grade accent stripe on card left edge */
        .table-card[data-active="all"]  { border-left: 3px solid var(--border); }
        .table-card[data-active="1"]    { border-left: 3px solid var(--red); }
        .table-card[data-active="2"]    { border-left: 3px solid var(--amber); }

        /* ── DataTables overrides ── */
        #recallTable_wrapper { padding: 14px 18px 18px; }

        #recallTable_wrapper .dataTables_filter input,
        #recallTable_wrapper .dataTables_length select {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 7px;
            color: var(--text);
            padding: 5px 10px;
            font-family: var(--sans);
            font-size: 12.5px;
            outline: none;
        }

        #recallTable_wrapper .dataTables_filter input:focus,
        #recallTable_wrapper .dataTables_length select:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }

        #recallTable_wrapper .dataTables_filter label,
        #recallTable_wrapper .dataTables_length label,
        #recallTable_wrapper .dataTables_info {
            color: var(--text-dim);
            font-size: 12.5px;
        }

        #recallTable_wrapper .dataTables_paginate .paginate_button {
            color: var(--text-dim) !important;
            border: 1px solid var(--border) !important;
            border-radius: 6px !important;
            padding: 4px 10px !important;
            margin: 0 2px !important;
            font-size: 12.5px;
            background: var(--surface) !important;
            transition: all .15s;
        }

        #recallTable_wrapper .dataTables_paginate .paginate_button:hover {
            background: var(--blue-soft) !important;
            color: var(--blue) !important;
            border-color: var(--blue-border) !important;
        }

        #recallTable_wrapper .dataTables_paginate .paginate_button.current {
            background: var(--blue) !important;
            color: #fff !important;
            border-color: var(--blue) !important;
            font-weight: 600;
        }

        #recallTable_wrapper .dataTables_paginate .paginate_button.disabled,
        #recallTable_wrapper .dataTables_paginate .paginate_button.disabled:hover {
            opacity: .35 !important;
            cursor: default !important;
            background: var(--surface) !important;
            color: var(--text-dim) !important;
            border-color: var(--border) !important;
        }

        #recallTable {
            border-collapse: separate !important;
            border-spacing: 0 !important;
            width: 100% !important;
        }

        #recallTable thead th {
            background: var(--surface2);
            color: var(--text-dim);
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 10px 14px;
            border: none !important;
            border-bottom: 1px solid var(--border) !important;
            white-space: nowrap;
        }

        #recallTable tbody tr {
            transition: background .1s;
        }

        #recallTable tbody tr:hover td { background: var(--blue-dim) !important; }

        /* Grade-filtered row tinting */
        .table-card[data-active="1"] #recallTable tbody tr:hover td { background: var(--red-dim) !important; }
        .table-card[data-active="2"] #recallTable tbody tr:hover td { background: var(--amber-dim) !important; }

        #recallTable tbody td {
            border: none !important;
            border-bottom: 1px solid var(--border-light) !important;
            padding: 12px 14px;
            font-size: 13.5px;
            color: var(--text);
            vertical-align: middle;
            background: transparent;
        }

        #recallTable tbody tr:last-child td { border-bottom: none !important; }

        .date-cell {
            font-family: var(--mono);
            font-size: 11.5px;
            color: var(--text-dim);
            white-space: nowrap;
        }

        .product-name {
            font-weight: 600;
            font-size: 13.5px;
            color: var(--text);
            line-height: 1.3;
        }

        .meta-text {
            display: block;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
            line-height: 1.4;
        }

        .batch-cell {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text);
            min-width: 140px;
            overflow-wrap: anywhere;
            line-height: 1.55;
        }

        .reason-text {
            font-size: 12.5px;
            color: var(--text-dim);
            line-height: 1.55;
        }

        /* ── Grade Badges ── */
        .badge-grade {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-family: var(--mono);
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.04em;
            padding: 4px 10px;
            border-radius: 100px;
            white-space: nowrap;
            border: 1px solid;
        }

        .badge-grade .badge-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .badge-danger  {
            background: var(--red-soft);
            color: var(--red);
            border-color: var(--red-border);
        }
        .badge-danger .badge-dot { background: var(--red); }

        .badge-warning {
            background: var(--amber-soft);
            color: var(--amber);
            border-color: var(--amber-border);
        }
        .badge-warning .badge-dot { background: var(--amber); }

        /* ── Skeleton ── */
        .skel {
            height: 13px;
            border-radius: 4px;
            background: linear-gradient(90deg, var(--border) 25%, var(--border-light) 50%, var(--border) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ── Empty state ── */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }

        .empty-state .empty-icon {
            font-size: 32px;
            margin-bottom: 12px;
            opacity: .5;
        }

        .empty-state p { font-size: 13px; }

        /* ════════════════ SCROLLBAR ════════════════ */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* ─── 手機端優化 (Mobile Optimization) ─── */
        @media (max-width: 768px) {
            /* 1. 頂部導航列折行與滿版 */
            .nav-inner {
                flex-wrap: wrap;
                height: auto;
                padding: 12px 16px;
                gap: 12px;
            }
            .nav-divider { display: none; } /* 隱藏分隔線 */
            
            /* 2. 統計標籤改為水平滑動 */
            .nav-stats {
                width: 100%;
                overflow-x: auto;
                padding-bottom: 4px;
                justify-content: flex-start;
            }
            .stat-pill { white-space: nowrap; }
            
            /* 3. 搜尋框滿版 */
            .nav-search { width: 100%; }
            .nav-search input { width: 100%; }

            /* 4. 外框與表格間距縮減 */
            .shell { padding: 16px 12px 40px; }
            #recallTable_wrapper { padding: 8px; }
            
            /* 5. 調整 DataTables 預設控制項在手機的排版 */
            .dataTables_length, .dataTables_filter { text-align: left !important; margin-bottom: 8px; }
            .dataTables_filter input { width: calc(100% - 40px); margin-left: 8px !important; }
        }
    </style>
</head>
<body>

<nav class="top-nav">
    <div class="nav-inner">

        <div class="brand">
            <div class="brand-icon">💊</div>
            <div class="brand-text">
                <h1>西藥回收監測看板</h1>
                <p>NHI Drug Recall Monitor</p>
            </div>
        </div>

        <div class="nav-sep"></div>

        <div class="nav-pills nav-stats">
            <div class="kpi-pill all stat-pill">
                <span class="dot"></span>
                <span id="pill-total">—</span> 總回收
            </div>
            <div class="kpi-pill red stat-pill">
                <span class="dot"></span>
                <span id="pill-class1">—</span> 第一級
            </div>
            <div class="kpi-pill amber stat-pill">
                <span class="dot"></span>
                <span id="pill-class2">—</span> 第二級
            </div>
        </div>

        <div class="nav-search">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" id="globalSearch" placeholder="搜尋藥品名稱或許可證字號…">
        </div>

    </div>
</nav>

<div class="shell">

    <div class="filter-bar">

        <div class="filter-tabs">
            <button class="tab-btn active" data-grade="all">
                <span class="tab-dot"></span>
                全部
                <span class="tab-count" id="cnt-all">—</span>
            </button>
            <button class="tab-btn" data-grade="1">
                <span class="tab-dot"></span>
                第一級回收
                <span class="tab-count" id="cnt-1">—</span>
            </button>
            <button class="tab-btn" data-grade="2">
                <span class="tab-dot"></span>
                第二級回收
